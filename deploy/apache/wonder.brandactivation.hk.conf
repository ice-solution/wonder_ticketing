<VirtualHost *:80>
    ServerName wonder.brandactivation.hk

    ServerAdmin webmaster@brandactivation.hk

    # Cloudflare Flexible SSL:
    # Browser -> Cloudflare is HTTPS, Cloudflare -> origin is HTTP.
    # Tell the Node app the public scheme/host are HTTPS on this domain.
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Ssl "on"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "wonder.brandactivation.hk"

    ProxyRequests Off
    ProxyTimeout 300

    # Wonder Ticketing production Node process.
    # Ensure the app is started with PORT=3777.
    ProxyPass        / http://127.0.0.1:3777/ retry=0 timeout=300
    ProxyPassReverse / http://127.0.0.1:3777/

    ErrorLog ${APACHE_LOG_DIR}/wonder.brandactivation.hk-error.log
    CustomLog ${APACHE_LOG_DIR}/wonder.brandactivation.hk-access.log combined
</VirtualHost>
